# Serves the static test site in /docs (e.g. https://nellcodx.github.io/reservation/)
# In repo Settings → Pages, source must be "GitHub Actions" (not "None", not the old branch+folder
# if you are using this workflow). Run manually once if needed: Actions → this workflow → Run.
name: Publish GitHub Pages preview
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Do not cancel a deploy in progress; matches GitHub’s static Pages template
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
