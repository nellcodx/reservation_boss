# Static site from /docs → GitHub Pages (official single-job static pattern).
#
# Settings → Pages → Source: GitHub Actions (save once).
#
# Supabase inject (optional): repository OR `github-pages` environment secrets.
#   PAGES_SUPABASE_*  or the same NEXT_PUBLIC_* names as packages/web/.env.local
#
# Node: keep until all composite Actions ship native Node 24 runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Deploy static site (docs) to Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/inject-book-supabase.py"
      - ".github/workflows/pages-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Inject Supabase boot config into book.html
        env:
          PAGES_SUPABASE_URL: ${{ secrets.PAGES_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          PAGES_SUPABASE_ANON_KEY: ${{ secrets.PAGES_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          PAGES_RESTAURANT_ID: ${{ secrets.PAGES_RESTAURANT_ID }}
          NEXT_PUBLIC_DEMO_RESTAURANT_ID: ${{ secrets.NEXT_PUBLIC_DEMO_RESTAURANT_ID }}
        run: python3 scripts/inject-book-supabase.py

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
