# Static site from /docs → GitHub Pages (official two-job pattern).
#
# Settings → Pages → Source: GitHub Actions (save once).
# Then push to main or run workflow manually.
#
# For live bookings on book.html, add repository secrets:
#   PAGES_SUPABASE_URL, PAGES_SUPABASE_ANON_KEY (same as NEXT_PUBLIC_* in the web app)
#   PAGES_RESTAURANT_ID (optional; defaults to demo seed UUID)

name: Deploy static site (docs) to Pages

# Run composite Actions (checkout, configure-pages, …) on Node 24+ to avoid
# Node 20 deprecation warnings on the runner.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/inject-book-supabase.py"
      - ".github/workflows/pages-deploy.yml"
  workflow_dispatch:

# build needs id-token + pages for configure-pages / artifact upload to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Supabase boot config into book.html
        env:
          PAGES_SUPABASE_URL: ${{ secrets.PAGES_SUPABASE_URL }}
          PAGES_SUPABASE_ANON_KEY: ${{ secrets.PAGES_SUPABASE_ANON_KEY }}
          PAGES_RESTAURANT_ID: ${{ secrets.PAGES_RESTAURANT_ID }}
        run: python3 scripts/inject-book-supabase.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
