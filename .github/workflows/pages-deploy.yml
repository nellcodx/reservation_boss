# Publishes the static site in /docs to GitHub Pages.
#
# After the first push of this file:
# 1. Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
#    (if the UI only offers Actions + workflows, pick this instead of “branch”.)
# 2. Push to `main` (or run “Deploy static site” manually in the Actions tab).
#
# If you still use “Deploy from a branch” + /docs, you do not need this workflow.

name: Deploy static site (docs) to Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
