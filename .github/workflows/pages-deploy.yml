# Static site from /docs → GitHub Pages (official single-job static pattern).
#
# Settings → Pages → Source: GitHub Actions (save once).
#
# Optional repository secrets (Settings → Secrets and variables → Actions):
#   PAGES_SUPABASE_URL, PAGES_SUPABASE_ANON_KEY — injected into docs/book.html
#   PAGES_RESTAURANT_ID — optional UUID (defaults to demo seed in inject script)

name: Deploy static site (docs) to Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/inject-book-supabase.py"
      - ".github/workflows/pages-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Inject Supabase boot config into book.html
        env:
          PAGES_SUPABASE_URL: ${{ secrets.PAGES_SUPABASE_URL }}
          PAGES_SUPABASE_ANON_KEY: ${{ secrets.PAGES_SUPABASE_ANON_KEY }}
          PAGES_RESTAURANT_ID: ${{ secrets.PAGES_RESTAURANT_ID }}
        run: python3 scripts/inject-book-supabase.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
