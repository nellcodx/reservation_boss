# Push to ghcr.io when main updates — use these images on any host (VPS, Coolify, etc.)
# Set package permissions: repo Settings → Actions → General → Workflow permissions: Read and write
name: Publish to GitHub Container Registry
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REG: ghcr.io

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Image names
        id: n
        run: |
          R="${GITHUB_REPOSITORY,,}"
          echo "API=${R}/rr-api" >> "$GITHUB_OUTPUT"
          echo "WEB=${R}/rr-web" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REG }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.REG }}/${{ steps.n.outputs.API }}:latest
            ${{ env.REG }}/${{ steps.n.outputs.API }}:sha-${{ github.sha }}

      - name: Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.REG }}/${{ steps.n.outputs.WEB }}:latest
            ${{ env.REG }}/${{ steps.n.outputs.WEB }}:sha-${{ github.sha }}
