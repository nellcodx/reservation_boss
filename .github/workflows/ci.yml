# Runs on every push/PR: install, lint, build (no Vercel — all on GitHub Actions)
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-and-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint (web)
        run: npm run lint -w @rr/web

      - name: Build web
        # Next build; Prisma client was generated in postinstall
        run: npm run build -w @rr/web

      - name: Build API
        run: npm run build -w @rr/api
